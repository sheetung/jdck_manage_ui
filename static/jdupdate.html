<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JD_COOKIE 管理系统</title>
    <style>
        /* ============ CSS 变量 ============ */
        :root {
            --primary: #667eea;
            --primary-dark: #5a6fd6;
            --secondary: #764ba2;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            
            --bg-glass: rgba(255, 255, 255, 0.75);
            --bg-glass-hover: rgba(255, 255, 255, 0.85);
            --bg-card: rgba(255, 255, 255, 0.95);
            --bg-overlay: rgba(0, 0, 0, 0.4);
            
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            
            --border-light: rgba(255, 255, 255, 0.6);
            --border-focus: var(--primary);
            
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 40px -10px rgba(0, 0, 0, 0.15);
            
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 18px;
            --radius-xl: 24px;
            
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ============ 全局重置 ============ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
            color: var(--text-primary);
            line-height: 1.5;
        }

        /* 背景遮罩 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: var(--bg-overlay);
            z-index: -1;
        }

        /* ============ 主容器 ============ */
        .container {
            width: 100%;
            max-width: 480px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-xl);
            padding: 24px;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============ 标题 ============ */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        h2 {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        h3 {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(102, 126, 234, 0.2);
        }

        /* ============ Tab 切换 ============ */
        .tab-nav {
            display: flex;
            gap: 4px;
            background: rgba(102, 126, 234, 0.08);
            border-radius: var(--radius-md);
            padding: 4px;
            margin-bottom: 24px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 16px;
            text-align: center;
            cursor: pointer;
            border: none;
            background: transparent;
            font-size: 0.9375rem;
            font-weight: 500;
            color: var(--text-secondary);
            border-radius: var(--radius-sm);
            transition: var(--transition);
            position: relative;
            width: 100%;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.5);
            color: var(--primary);
        }

        .tab-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        /* Tab 内容 */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============ 表单 ============ */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-family: inherit;
            background: white;
            transition: var(--transition);
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        input::placeholder,
        textarea::placeholder {
            color: var(--text-muted);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            line-height: 1.5;
        }

        /* Checkbox 样式 */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .checkbox-group label {
            margin-bottom: 0;
            cursor: pointer;
        }

        /* ============ 按钮 ============ */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            box-shadow: 0 4px 14px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .btn-sm {
            padding: 10px 16px;
            font-size: 0.875rem;
        }

        /* ============ 结果显示 ============ */
        .result {
            margin-top: 20px;
            padding: 16px;
            border-radius: var(--radius-md);
            font-size: 0.9375rem;
            text-align: center;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .result.show {
            display: block;
        }

        .result-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #047857;
        }

        .result-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #dc2626;
        }

        .result-info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #2563eb;
        }

        /* ============ 查询结果卡片 ============ */
        .query-result {
            margin-top: 20px;
        }

        .result-card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-md);
        }

        .result-card:last-child {
            margin-bottom: 0;
        }

        .result-card-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f3f4f6;
        }

        .info-row {
            display: flex;
            flex-direction: column;
            padding: 12px 0;
            border-bottom: 1px solid #f3f4f6;
        }

        .info-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .info-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 0.9375rem;
            color: var(--text-primary);
            word-break: break-all;
        }

        /* 状态标签 */
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-active {
            background: rgba(16, 185, 129, 0.15);
            color: #059669;
        }

        .status-inactive {
            background: rgba(239, 68, 68, 0.15);
            color: #dc2626;
        }

        /* ============ 加载动画 ============ */
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(102, 126, 234, 0.2);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ============ 帮助按钮 ============ */
        .help-btn {
            margin-top: 24px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: white;
            font-weight: 500;
        }

        .help-btn::before {
            content: "💡";
            font-size: 1.125rem;
        }

        /* ============ 模态框 ============ */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.85);
            overflow: auto;
            animation: fadeIn 0.2s ease;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal-content {
            position: relative;
            background: #1f2937;
            border-radius: var(--radius-lg);
            max-width: 90vw;
            max-height: 90vh;
            overflow: hidden;
            animation: scaleIn 0.3s ease;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: #f3f4f6;
        }

        .modal-close {
            background: none;
            border: none;
            color: #9ca3af;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 4px;
            line-height: 1;
            width: auto;
            transition: var(--transition);
        }

        .modal-close:hover {
            color: white;
        }

        .modal-body {
            padding: 20px;
            overflow: auto;
            max-height: calc(90vh - 60px);
            color: #f3f4f6;
            white-space: pre-wrap;
        }

        .help-image {
            max-width: 100%;
            height: auto;
            border-radius: var(--radius-sm);
        }

        /* ============ 版权信息 ============ */
        .copyright {
            text-align: center;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .copyright a {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
        }

        .copyright a:hover {
            text-decoration: underline;
        }

        /* ============ 邮箱绑定表单 ============ */
        .email-form {
            margin-top: 16px;
        }

        .email-form .form-group {
            margin-bottom: 12px;
        }

        /* ============ 响应式设计 ============ */
        @media (max-width: 480px) {
            body {
                padding: 12px;
                align-items: flex-start;
                padding-top: max(12px, env(safe-area-inset-top));
                padding-bottom: max(12px, env(safe-area-inset-bottom));
            }

            .container {
                padding: 20px;
                margin-top: 20px;
                margin-bottom: 20px;
            }

            h2 {
                font-size: 1.5rem;
            }

            h3 {
                font-size: 1rem;
            }

            .tab-btn {
                padding: 10px 12px;
                font-size: 0.875rem;
            }

            .btn {
                padding: 12px 20px;
            }

            input[type="text"],
            input[type="email"],
            input[type="password"],
            textarea {
                padding: 12px 14px;
                font-size: 16px; /* 防止iOS缩放 */
            }

            .result-card {
                padding: 16px;
            }

            .modal-content {
                max-width: 95vw;
            }

            .modal-body {
                padding: 16px;
            }
        }

        /* 横屏手机优化 */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                padding: 8px;
            }

            .container {
                margin: 8px 0;
                padding: 16px;
            }

            .header {
                margin-bottom: 16px;
            }

            h2 {
                font-size: 1.25rem;
                margin-bottom: 0;
            }

            .subtitle {
                display: none;
            }
        }

        /* ============ 工具类 ============ */
        .mt-2 {
            margin-top: 8px;
        }

        .mt-3 {
            margin-top: 12px;
        }

        .mt-4 {
            margin-top: 16px;
        }

        .text-center {
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>JD_COOKIE 管理</h2>
        <p class="subtitle">京东 Cookie 管理系统</p>
    </div>

    <!-- Tab 导航 -->
    <div class="tab-nav" role="tablist">
        <button class="tab-btn active" onclick="openTab(event, 'queryTab')" role="tab" aria-selected="true">查询</button>
        <button class="tab-btn" onclick="openTab(event, 'updateTab')" role="tab" aria-selected="false">更新</button>
    </div>

    <!-- 查询 Tab -->
    <div id="queryTab" class="tab-content active" role="tabpanel">
        <h3>查询 Cookie</h3>
        
        <div class="form-group">
            <label for="ptpin">pt_pin 值</label>
            <input type="text" id="ptpin" placeholder="请输入 pt_pin 值">
        </div>

        <button class="btn btn-primary" id="queryBtn" onclick="queryCookie()">查询</button>
        
        <div id="queryResult" class="query-result"></div>
    </div>

    <!-- 更新 Tab -->
    <div id="updateTab" class="tab-content" role="tabpanel">
        <h3>更新 Cookie</h3>
        
        <div class="form-group">
            <label for="value">完整 JD_COOKIE 值</label>
            <textarea id="value" rows="4" placeholder="请输入完整的 JD_COOKIE 值，例如: pt_key=xxx;pt_pin=yyy;"></textarea>
        </div>

        <button class="btn btn-primary" id="updateBtn" onclick="updateCookie()">更新并启用</button>
        
        <div id="result" class="result"></div>
    </div>

    <!-- 帮助按钮 -->
    <button class="btn btn-secondary help-btn" id="helpBtn">JD_COOKIE 获取方法</button>

    <!-- 版权信息 -->
    <div class="copyright">
        © 2025 <a href="https://github.com/sheetung/jdck_manage_ui" target="_blank" rel="noopener noreferrer">sheetung</a>. All rights reserved.
    </div>
</div>

<!-- 帮助模态框 -->
<div id="helpModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title">使用帮助</h3>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body">
            <img class="help-image" id="helpImage" alt="JD_COOKIE 获取方法">
        </div>
    </div>
</div>

<!-- 通知弹窗 -->
<div id="notificationModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title">系统通知</h3>
            <button class="modal-close" onclick="closeNotification()">&times;</button>
        </div>
        <div class="modal-body" id="notificationBody"></div>
        <div class="modal-header">
            <button class="btn btn-primary" onclick="closeNotification()" style="width: 100%;">确定</button>
        </div>
    </div>
</div>

<script>
    // 页面加载
    async function loadConfig() {
        try {
            const res = await fetch("/api/config");
            const data = await res.json();
            if (data.code === 200 && data.data.backgroundImageUrl) {
                document.body.style.backgroundImage = `url('${data.data.backgroundImageUrl}')`;
            }
        } catch (err) {
            console.error('加载配置失败:', err);
            document.body.style.backgroundImage = "url('https://t.alcy.cc/ycy')";
        }
    }
    loadConfig();
    
    // 检查通知
    async function checkNotification() {
        try {
            const res = await fetch("/api/notification");
            const data = await res.json();
            if (data.code === 200) {
                const notification = data.data || {};
                if ((notification.enabled === true || notification.enabled === 'true') && notification.content) {
                    showNotification(notification.content);
                }
            }
        } catch (err) {
            console.error('检查通知失败:', err);
        }
    }

    // 调试：临时在控制台输出通知内容
    // console.log('[notification]', notification);
    
    // 显示通知
    function showNotification(content) {
        const notificationModal = document.getElementById('notificationModal');
        const notificationBody = document.getElementById('notificationBody');
        notificationBody.textContent = content || '';
        // 兜底渲染：同步设置属性，避免某些浏览器/样式下 textContent 不显示
        notificationBody.innerText = notificationBody.textContent;
        notificationModal.classList.add('show');
    }
    
    // 关闭通知
    function closeNotification() {
        const notificationModal = document.getElementById('notificationModal');
        notificationModal.classList.remove('show');
    }
    
    // 页面加载时检查通知
    window.onload = function() {
        loadConfig();
        checkNotification();
    };

    // 兜底：确保通知检查执行
    document.addEventListener('DOMContentLoaded', function() {
        checkNotification();
    });

    // 元素引用
    const updateBtn = document.getElementById("updateBtn");
    const result = document.getElementById("result");
    const queryBtn = document.getElementById("queryBtn");
    const queryResult = document.getElementById("queryResult");
    const valueInput = document.getElementById("value");
    const ptpinInput = document.getElementById("ptpin");

    // Tab 切换
    function openTab(evt, tabName) {
        document.querySelectorAll(".tab-content").forEach(el => el.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach(el => {
            el.classList.remove("active");
            el.setAttribute("aria-selected", "false");
        });
        
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
        evt.currentTarget.setAttribute("aria-selected", "true");

        // 重置结果
        result.className = "result";
        queryResult.innerHTML = '';
    }

    // 输入处理
    valueInput.addEventListener('input', function() {
        this.value = this.value.trim();
    });
    ptpinInput.addEventListener('input', function() {
        this.value = this.value.trim();
    });

    // 显示结果
    function showResult(element, type, message) {
        element.className = `result show result-${type}`;
        element.innerHTML = message;
    }

    // 更新 Cookie
    async function updateCookie() {
        const value = valueInput.value.trim();
        
        result.className = "result";
        
        if (!value) {
            showResult(result, 'error', 'JD_COOKIE 不能为空');
            return;
        }
        
        if (!value.includes('pt_key=') || !value.includes('pt_pin=')) {
            showResult(result, 'error', '格式不正确，缺少 pt_key 或 pt_pin');
            return;
        }

        updateBtn.disabled = true;
        showResult(result, 'info', '<span class="loading-spinner"></span>正在提交...');

        try {
            const res = await fetch("/api/jdcookie/update", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ value })
            });
            
            const data = await res.json();
            
            if (data.code === 200) {
                showResult(result, 'success', '✓ ' + data.message);
                valueInput.value = '';
            } else {
                showResult(result, 'error', data.message);
            }
        } catch(err) {
            showResult(result, 'error', `请求异常: ${err.message || '未知错误'}`);
        } finally {
            updateBtn.disabled = false;
        }
    }

    // 查询 Cookie
    async function queryCookie() {
        const ptpin = ptpinInput.value.trim();
        
        queryResult.innerHTML = '';
        
        if (!ptpin) {
            queryResult.innerHTML = `<div class="result show result-error">pt_pin 不能为空</div>`;
            return;
        }

        queryBtn.disabled = true;
        queryResult.innerHTML = `<div class="result show result-info"><span class="loading-spinner"></span>正在查询...</div>`;

        try {
            const res = await fetch(`/api/jdcookie/query?ptpin=${encodeURIComponent(ptpin)}`);
            const data = await res.json();
            
            if (data.code === 200) {
                const envInfo = data.data;
                const statusHtml = envInfo.status === 0 
                    ? '<span class="status-badge status-active">已启用</span>'
                    : '<span class="status-badge status-inactive">已禁用</span>';
                
                queryResult.innerHTML = `
                    <div class="result-card">
                        <div class="result-card-title">查询结果</div>
                        <div class="info-row">
                            <span class="info-label">名称</span>
                            <span class="info-value">${escapeHTML(envInfo.name)}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">状态</span>
                            <span class="info-value">${statusHtml}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">备注</span>
                            <span class="info-value">${escapeHTML(envInfo.remarks || '无')}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">更新时间</span>
                            <span class="info-value">${formatDate(envInfo.updatedAt) || '未知'}</span>
                        </div>
                    </div>
                    
                    <div class="result-card">
                        <div class="result-card-title">邮箱通知设置</div>
                        <div class="email-form">
                            <div class="form-group">
                                <label for="email">邮箱地址</label>
                                <input type="email" id="email" placeholder="请输入邮箱地址" value="${escapeHTML(envInfo.email || '')}">
                            </div>
                            <div class="checkbox-group">
                                <input type="checkbox" id="emailNotification" ${envInfo.emailNotification ? 'checked' : ''}>
                                <label for="emailNotification">开启邮件通知</label>
                            </div>
                            <button class="btn btn-primary btn-sm mt-4" onclick="bindEmail('${escapeHTML(ptpin)}')">绑定邮箱</button>
                        </div>
                    </div>
                `;
            } else {
                queryResult.innerHTML = `<div class="result show result-error">${escapeHTML(data.message)}</div>`;
            }
        } catch(err) {
            queryResult.innerHTML = `<div class="result show result-error">请求异常: ${escapeHTML(err.message || '未知错误')}</div>`;
        } finally {
            queryBtn.disabled = false;
        }
    }

    // 绑定邮箱
    async function bindEmail(ptpin) {
        const email = document.getElementById('email').value.trim();
        const emailNotification = document.getElementById('emailNotification').checked;
        
        if (!email) {
            queryResult.innerHTML += `<div class="result show result-error mt-4">邮箱地址不能为空</div>`;
            return;
        }
        
        try {
            const res = await fetch("/api/jdcookie/bind-email", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ ptpin, email, emailNotification })
            });
            
            const data = await res.json();
            
            if (data.code === 200) {
                queryResult.innerHTML += `<div class="result show result-success mt-4">✓ ${escapeHTML(data.message)}</div>`;
            } else {
                queryResult.innerHTML += `<div class="result show result-error mt-4">${escapeHTML(data.message)}</div>`;
            }
        } catch(err) {
            queryResult.innerHTML += `<div class="result show result-error mt-4">请求异常: ${escapeHTML(err.message || '未知错误')}</div>`;
        }
    }

    // 工具函数
    function formatDate(dateString) {
        if (!dateString) return null;
        try {
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        } catch (e) {
            return dateString;
        }
    }

    function escapeHTML(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // 帮助模态框
    const helpModal = document.getElementById("helpModal");
    const helpImage = document.getElementById("helpImage");
    helpImage.src = "/static/ckhelp.png";
    helpImage.alt = "JD_COOKIE 获取方法";

    document.getElementById("helpBtn").onclick = function() {
        helpModal.classList.add("show");
    };

    function closeModal() {
        helpModal.classList.remove("show");
    }

    helpModal.onclick = function(event) {
        if (event.target === helpModal) {
            closeModal();
        }
    };

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeModal();
        }
    });
</script>

</body>
</html>
