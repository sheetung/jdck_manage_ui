<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管理员登录 - JD_COOKIE 管理系统</title>
    <style>
        /* ============ CSS 变量 ============ */
        :root {
            --primary: #667eea;
            --primary-dark: #5a6fd6;
            --secondary: #764ba2;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            
            --bg-glass: rgba(255, 255, 255, 0.75);
            --bg-glass-hover: rgba(255, 255, 255, 0.85);
            --bg-card: rgba(255, 255, 255, 0.95);
            --bg-overlay: rgba(0, 0, 0, 0.4);
            
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            
            --border-light: rgba(255, 255, 255, 0.6);
            --border-focus: var(--primary);
            
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 40px -10px rgba(0, 0, 0, 0.15);
            
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 18px;
            --radius-xl: 24px;
            
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ============ 全局重置 ============ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
            color: var(--text-primary);
            line-height: 1.5;
        }

        /* 背景遮罩 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: var(--bg-overlay);
            z-index: -1;
        }

        /* ============ 主容器 ============ */
        .container {
            width: 100%;
            max-width: 400px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-xl);
            padding: 32px 28px;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============ 标题 ============ */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        }

        .logo svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        /* ============ 表单 ============ */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-family: inherit;
            background: white;
            transition: var(--transition);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        input::placeholder {
            color: var(--text-muted);
        }

        /* ============ 按钮 ============ */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            box-shadow: 0 4px 14px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ============ 结果显示 ============ */
        .result {
            margin-top: 16px;
            padding: 14px;
            border-radius: var(--radius-md);
            font-size: 0.9375rem;
            text-align: center;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .result.show {
            display: block;
        }

        .result-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #dc2626;
        }

        .result-info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #2563eb;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============ 加载动画 ============ */
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(102, 126, 234, 0.2);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ============ 版权信息 ============ */
        .copyright {
            text-align: center;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        /* ============ 响应式设计 ============ */
        @media (max-width: 480px) {
            body {
                padding: 12px;
                align-items: flex-start;
                padding-top: max(12px, env(safe-area-inset-top));
                padding-bottom: max(12px, env(safe-area-inset-bottom));
            }

            .container {
                padding: 24px 20px;
                margin-top: 20px;
                margin-bottom: 20px;
            }

            .logo {
                width: 56px;
                height: 56px;
            }

            .logo svg {
                width: 28px;
                height: 28px;
            }

            h2 {
                font-size: 1.375rem;
            }

            input[type="text"],
            input[type="password"] {
                padding: 12px 14px;
                font-size: 16px; /* 防止iOS缩放 */
            }
        }

        /* 横屏手机优化 */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                padding: 8px;
            }

            .container {
                margin: 8px 0;
                padding: 20px;
            }

            .header {
                margin-bottom: 20px;
            }

            .logo {
                width: 48px;
                height: 48px;
                margin-bottom: 12px;
            }

            .logo svg {
                width: 24px;
                height: 24px;
            }

            h2 {
                font-size: 1.25rem;
            }

            .subtitle {
                display: none;
            }

            .form-group {
                margin-bottom: 16px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
            </svg>
        </div>
        <h2>管理员登录</h2>
        <p class="subtitle">请输入您的管理员账号</p>
    </div>
    
    <form onsubmit="event.preventDefault(); login();">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" placeholder="请输入管理员用户名" autocomplete="username">
        </div>
        
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" placeholder="请输入管理员密码" autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary" id="loginBtn">登 录</button>
    </form>
    
    <div id="result" class="result"></div>
    
    <div class="copyright">
        © 2025 sheetung. All rights reserved.
    </div>
</div>

<script>
    // 页面加载时设置背景图
    async function loadConfig() {
        try {
            const res = await fetch("/api/config");
            const data = await res.json();
            if (data.code === 200 && data.data.backgroundImageUrl) {
                document.body.style.backgroundImage = `url('${data.data.backgroundImageUrl}')`;
            }
        } catch (err) {
            console.error('加载配置失败:', err);
            document.body.style.backgroundImage = "url('https://t.alcy.cc/ycy')";
        }
    }
    loadConfig();

    const loginBtn = document.getElementById("loginBtn");
    const result = document.getElementById("result");
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");

    // 显示结果
    function showResult(type, message) {
        result.className = `result show result-${type}`;
        result.innerHTML = message;
    }

    // 登录功能
    async function login() {
        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();
        
        result.className = "result";
        
        if (!username || !password) {
            showResult('error', '用户名和密码不能为空');
            return;
        }

        loginBtn.disabled = true;
        showResult('info', '<span class="loading-spinner"></span>正在登录...');

        try {
            const res = await fetch("/api/admin/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });
            
            const data = await res.json();
            
            if (data.code === 200) {
                showResult('info', '登录成功，正在跳转...');
                setTimeout(() => {
                    window.location.href = "/admin";
                }, 500);
            } else {
                showResult('error', data.message);
                loginBtn.disabled = false;
            }
        } catch(err) {
            showResult('error', `请求异常: ${err.message || '未知错误'}`);
            loginBtn.disabled = false;
        }
    }

    // 回车提交
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !loginBtn.disabled) {
            login();
        }
    });
</script>

</body>
</html>
